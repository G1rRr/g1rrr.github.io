<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>knowledge linker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=Space+Grotesk:wght@300;400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0000FF;font-family:'Space Grotesk',sans-serif;min-height:100vh;display:flex;justify-content:center;padding:30px 20px}
.wrap{max-width:680px;width:100%}
.card{background:#FFF;padding:36px 36px 28px;border:3px solid #000;box-shadow:10px 10px 0 #FF0080;margin-bottom:20px}
h1{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;letter-spacing:-.5px;display:flex;align-items:center;gap:12px}
h1 .dot{width:10px;height:10px;background:#FF0080;flex-shrink:0}
.tag{display:inline-block;background:#FF0080;color:#FFF;font-size:9px;letter-spacing:3px;padding:3px 10px;margin:10px 0 16px}
.desc{font-size:13px;line-height:1.8;color:#555;margin-bottom:20px}

/* 阶段管道 */
.pipeline{display:flex;align-items:center;gap:0;margin-bottom:24px;overflow-x:auto;padding-bottom:4px}
.pipe{flex:1;min-width:70px;text-align:center;position:relative;padding:8px 6px;background:#F0F0FF;border:1.5px solid #ddd;font-size:10px;letter-spacing:1px;color:#999;transition:all .4s}
.pipe.active{background:#0000FF;border-color:#0000FF;color:#FFF;font-weight:700}
.pipe+.pipe{border-left:none}
.pipe .n{font-family:'Syne',sans-serif;font-size:16px;display:block}

/* 输入 */
.input-row{display:flex;gap:8px;margin-bottom:8px}
input{flex:1;padding:14px 16px;border:2px solid #000;font-family:'Space Grotesk',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
input:focus{border-color:#FF0080}
.btn{width:100%;padding:14px;background:#0000FF;color:#FFF;border:2px solid #0000FF;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;letter-spacing:2px;cursor:pointer;transition:all .2s}
.btn:hover{background:#FF0080;border-color:#FF0080}
.btn:disabled{opacity:.3;pointer-events:none}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.chip{padding:5px 12px;border:1.5px solid #ddd;font-size:11px;color:#666;cursor:pointer;transition:all .15s;background:#FFF}
.chip:hover{border-color:#FF0080;color:#FF0080}

/* 画布 */
canvas{display:block;margin:20px 0;background:#FAFAFF;border:1.5px solid #eee;width:100%}
#output{display:none}

/* 结果节点 */
.nodes{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
.node{padding:14px;border:2px solid #ddd;background:#FFF;font-size:12px;line-height:1.5;transition:all .3s;cursor:default;opacity:0;transform:scale(.95)}
.node.show{opacity:1;transform:scale(1)}
.node:hover{border-color:#FF0080}
.node .score{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#FF0080}
.node .title{font-weight:700;color:#000;margin:2px 0}
.node .rel{font-size:10px;color:#999}

.feedback{display:flex;gap:6px;margin-top:12px;padding-top:12px;border-top:1px solid #eee}
.fb-btn{padding:6px 14px;font-size:11px;border:1.5px solid #ddd;background:#FFF;color:#666;cursor:pointer;transition:all .15s}
.fb-btn:hover{border-color:#FF0080;color:#FF0080}
.fb-btn.on{border-color:#FF0080;background:#FF0080;color:#FFF}

.back{display:inline-block;margin-top:16px;color:rgba(255,255,255,.5);font-size:11px;letter-spacing:2px;text-decoration:none;border-bottom:1.5px solid rgba(255,0,128,.4);padding-bottom:2px}
.back:hover{color:#FFF;border-color:#FF0080}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1><span class="dot"></span>knowledge linker</h1>
    <div class="tag">感知 → 规划 → 工具调用 → 反馈闭环</div>
    <p class="desc">输入任何知识片段，Agent 自动发现语义关联并主动推送匹配节点。</p>

    <div class="pipeline" id="pipeline">
      <div class="pipe" id="p0"><span class="n">1</span>感知</div>
      <div class="pipe" id="p1"><span class="n">2</span>规划</div>
      <div class="pipe" id="p2"><span class="n">3</span>工具调用</div>
      <div class="pipe" id="p3"><span class="n">4</span>反馈闭环</div>
    </div>

    <input id="q" placeholder="输入一段知识...">
    <div class="chips">
      <span class="chip" onclick="setQ('Transformer 架构的核心是自注意力机制')">Transformer / 自注意力</span>
      <span class="chip" onclick="setQ('LangGraph 用状态图编排多步 Agent 流程')">LangGraph Agent 编排</span>
      <span class="chip" onclick="setQ('RAG 结合检索增强与 LLM 生成')">RAG 检索增强</span>
      <span class="chip" onclick="setQ('因果推断的核心方法包括 do-calculus 和反事实推理')">因果推断</span>
    </div>
    <button class="btn" id="runBtn" onclick="run()">开始连接</button>
    <canvas id="c" width="600" height="200"></canvas>
    <div id="output">
      <div class="nodes" id="nodes"></div>
      <div class="feedback" id="fb">
        <button class="fb-btn" onclick="fbClick(this)">相关</button>
        <button class="fb-btn" onclick="fbClick(this)">不相关</button>
        <button class="fb-btn" onclick="fbClick(this)">收藏</button>
      </div>
    </div>
  </div>
  <a href="/" class="back">← Back to G1rRr</a>
</div>

<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const data={
  'Transformer':[
    {t:'Attention Is All You Need (2017)',s:94,r:'奠基论文'},
    {t:'BERT：双向 Transformer 编码器',s:87,r:'预训练模型'},
    {t:'Multi-Head Attention 机制',s:82,r:'核心技术'},
    {t:'GPT：自回归 Transformer',s:76,r:'生成式模型'},
  ],
  'LangGraph':[
    {t:'LangChain 框架概述',s:91,r:'底层框架'},
    {t:'Agent 状态机设计模式',s:85,r:'设计模式'},
    {t:'多步推理编排',s:79,r:'核心能力'},
    {t:'工具调用节点',s:72,r:'执行模块'},
  ],
  'RAG':[
    {t:'向量数据库选型指南',s:90,r:'基础设施'},
    {t:'Embedding 模型对比',s:84,r:'技术选型'},
    {t:'检索重排序策略',s:78,r:'优化方法'},
    {t:'HyDE 假设文档嵌入',s:69,r:'前沿技术'},
  ],
  '因果':[
    {t:'Judea Pearl 因果关系三部曲',s:93,r:'理论基础'},
    {t:'do-calculus 干预运算',s:86,r:'核心方法'},
    {t:'反事实推理框架',s:80,r:'推理范式'},
    {t:'因果发现算法综述',s:70,r:'应用方向'},
  ],
  'default':[
    {t:'语义关联节点 A',s:88,r:'高度相关'},
    {t:'语义关联节点 B',s:75,r:'中度相关'},
    {t:'语义关联节点 C',s:63,r:'潜在关联'},
    {t:'语义关联节点 D',s:51,r:'弱关联'},
  ]
};

let nodes=[],animating=false,phase=0;

function setQ(v){document.getElementById('q').value=v}

function resetPipe(){
  for(let i=0;i<4;i++)document.getElementById('p'+i).classList.remove('active');
}

function drawCanvas(){
  ctx.clearRect(0,0,600,200);
  if(nodes.length===0)return;
  // 中心节点 — 用户输入
  ctx.fillStyle='#0000FF';ctx.beginPath();ctx.arc(300,100,28,0,6.28);ctx.fill();
  ctx.fillStyle='#FFF';ctx.font='bold 10px Syne';ctx.textAlign='center';ctx.fillText('输入',300,106);
  // 连线 + 结果节点
  nodes.forEach((n,i)=>{
    const a=(i/nodes.length)*Math.PI*2-Math.PI/2;
    const rx=300+Math.cos(a)*130,ry=100+Math.sin(a)*130;
    // 连线
    const progress=Math.min(1,(animating?phase:1));
    const ex=300+(rx-300)*progress,ey=100+(ry-100)*progress;
    ctx.strokeStyle=n.fb==='related'?'#FF0080':n.fb==='dismiss'?'#ddd':'#0000FF';
    ctx.lineWidth=n.fb==='related'?2.5:1.2;
    ctx.beginPath();ctx.moveTo(300,100);ctx.lineTo(ex,ey);ctx.stroke();
    // 节点圆
    const sz=n.fb==='related'?22:16;
    ctx.fillStyle=n.fb==='related'?'#FF0080':n.fb==='dismiss'?'#CCC':'#FFF';
    ctx.beginPath();ctx.arc(ex,ey,sz,0,6.28);ctx.fill();
    ctx.strokeStyle='#000';ctx.lineWidth=1.5;ctx.stroke();
    if(n.fb!=='dismiss'){
      ctx.fillStyle=n.fb==='related'?'#FFF':'#0000FF';
      ctx.font='bold 9px Space Grotesk';ctx.textAlign='center';
      ctx.fillText(n.s+'%',ex,ey+3);
    }
  });
}

async function run(){
  if(animating)return;
  const btn=document.getElementById('runBtn');
  const out=document.getElementById('output');
  const q=document.getElementById('q').value.trim();
  if(!q)return;
  btn.disabled=true;animating=true;nodes=[];phase=0;
  out.style.display='none';resetPipe();

  // 匹配数据
  let key='default';
  for(const k of Object.keys(data)){
    if(k!=='default'&&q.includes(k)){key=k;break}
  }
  const raw=data[key];

  // 阶段1：感知
  document.getElementById('p0').classList.add('active');
  await sleep(500);

  // 阶段2：规划
  document.getElementById('p1').classList.add('active');
  nodes=raw.map(n=>({...n}));
  phase=.3;drawCanvas();
  await sleep(500);

  // 阶段3：工具调用
  document.getElementById('p2').classList.add('active');
  phase=.7;drawCanvas();
  await sleep(700);

  // 阶段4：反馈闭环
  document.getElementById('p3').classList.add('active');
  phase=1;drawCanvas();
  out.style.display='block';
  const nc=document.getElementById('nodes');
  nc.innerHTML=nodes.map((n,i)=>`<div class="node" style="transition-delay:${i*.1}s"><div class="score">${n.s}%</div><div class="title">${n.t}</div><div class="rel">${n.r}</div></div>`).join('');
  requestAnimationFrame(()=>document.querySelectorAll('.node').forEach(el=>el.classList.add('show')));
  document.querySelectorAll('#fb .fb-btn').forEach(b=>b.classList.remove('on'));

  btn.disabled=false;animating=false;
}

function fbClick(el){
  document.querySelectorAll('#fb .fb-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  const t=el.textContent.trim();
  nodes.forEach(n=>{
    if(t==='相关')n.fb='related';
    else if(t==='不相关')n.fb='dismiss';
    delete n.fb;
  });
  drawCanvas();
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')run()});
</script>
</body>
</html>
