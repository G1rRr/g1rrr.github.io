<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Startup Survival</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=Space+Grotesk:wght@300;400;700&display=swap');
:root{
  --c-blue:#0000FF;--c-pink:#FF0080;--c-white:#FFFFFF;--c-black:#050505;
  --paper:#FFFFFF;--paper2:#F0F0FF;--paper3:#E0E0FF;
  --rule:rgba(0,0,0,0.12);--rule2:rgba(0,0,0,0.06);
  --dim:rgba(0,0,0,0.48);--dim2:rgba(0,0,0,0.26);
  --text:#050505;
  --serif:'Syne',sans-serif;
  --mono:'Space Grotesk',monospace;
  --sans:'Space Grotesk',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--paper);}
body{color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;}
#app{max-width:660px;margin:0 auto;padding:24px 20px 80px;min-height:100vh;position:relative;z-index:1;}
#bgCanvas{position:fixed;inset:0;pointer-events:none;z-index:0;background:#0000FF;}

/* SETUP */
#setup{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:88vh;text-align:center;position:relative;}
.s-eye{font-family:var(--mono);font-size:9px;letter-spacing:5px;color:var(--dim);margin-bottom:20px;display:flex;align-items:center;gap:14px;}
.s-eye::before,.s-eye::after{content:'';flex:1;max-width:52px;height:1px;background:var(--c-blue);}
.s-title{font-family:var(--serif);font-size:clamp(34px,6vw,54px);font-weight:400;line-height:1.05;letter-spacing:-0.5px;color:var(--text);}
.s-title em{font-style:italic;color:var(--c-blue);}
.s-rt{width:100%;height:2px;background:linear-gradient(to right,var(--c-blue),var(--c-pink));margin:18px 0 0;}
.s-rs{width:100%;height:1px;background:var(--rule);margin:5px 0 22px;}
.s-desc{font-family:var(--serif);font-size:14px;font-style:italic;color:var(--dim);line-height:1.9;max-width:380px;margin-bottom:36px;}
.s-lbl{font-family:var(--mono);font-size:8px;letter-spacing:4px;color:var(--dim);margin-bottom:9px;}
#company-input{background:transparent;border:none;border-bottom:1.5px solid var(--c-blue);color:var(--text);font-family:var(--serif);font-size:21px;padding:7px 0;width:100%;max-width:320px;text-align:center;outline:none;transition:border-color .2s;caret-color:var(--c-pink);}
#company-input:focus{border-color:var(--c-pink);}
#company-input::placeholder{color:var(--dim2);font-style:italic;}
#start-btn{margin-top:22px;padding:12px 48px;background:var(--c-blue);border:none;color:white;font-family:var(--mono);font-size:9px;letter-spacing:5px;cursor:pointer;transition:background .2s;width:100%;max-width:320px;}
#start-btn:hover{background:var(--c-black);}
.s-meta{margin-top:18px;font-family:var(--mono);font-size:8px;color:var(--dim2);letter-spacing:2px;}

/* GAME */
#game{display:none;}
.hdr-top{display:flex;justify-content:space-between;align-items:baseline;padding-bottom:8px;}
.co-name{font-family:var(--serif);font-size:21px;font-weight:400;color:var(--text);letter-spacing:.3px;}
.hdr-chips{display:flex;gap:7px;align-items:center;}
.chip{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;padding:3px 9px;border:1px solid var(--rule);cursor:default;transition:all .15s;background:transparent;}
.chip.btn{cursor:pointer;}
.chip.btn:hover{border-color:var(--c-blue);color:var(--text);}
.chip.warn{color:var(--c-pink);border-color:rgba(255,0,128,.35);}
.chip.danger{color:var(--c-pink);border-color:var(--c-pink);font-weight:600;animation:dp .9s infinite;}
@keyframes dp{0%,100%{opacity:1;}50%{opacity:.4;}}
.hdr-rt{height:2px;background:linear-gradient(to right,var(--c-blue),var(--c-pink));}
.hdr-rs{height:1px;background:var(--rule);margin-top:4px;margin-bottom:14px;}

/* TICKER */
.ticker-wrap{overflow:hidden;padding:5px 0;margin-bottom:14px;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);position:relative;}
.ticker-wrap::before,.ticker-wrap::after{content:'';position:absolute;top:0;bottom:0;width:28px;z-index:2;pointer-events:none;}
.ticker-wrap::before{left:0;background:linear-gradient(to right,var(--paper),transparent);}
.ticker-wrap::after{right:0;background:linear-gradient(to left,var(--paper),transparent);}
.ticker-inner{display:flex;gap:52px;animation:tk 60s linear infinite;width:max-content;white-space:nowrap;}
@keyframes tk{to{transform:translateX(-50%);}}
.t-item{font-family:var(--mono);font-size:9px;color:var(--dim);}
.t-item.hot{color:var(--c-pink);}

/* PROGRESS */
.prog-meta{display:flex;justify-content:space-between;margin-bottom:4px;font-family:var(--mono);font-size:8px;color:var(--dim);letter-spacing:1px;}
.prog-track{height:2px;background:rgba(0,0,255,0.1);margin-bottom:4px;position:relative;}
.prog-fill{height:100%;background:linear-gradient(to right,var(--c-blue),var(--c-pink));transition:width .5s ease;}
.prog-dots{display:flex;justify-content:space-between;margin-bottom:14px;}
.prog-dot{width:1px;height:3px;background:rgba(0,0,255,0.1);}
.prog-dot.done{background:var(--c-blue);}
.prog-dot.now{width:3px;height:5px;background:var(--c-pink);margin-top:-1px;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--rule);margin-bottom:8px;background:var(--paper);}
.stat-box{padding:11px 9px;border-right:1px solid var(--rule);position:relative;}
.stat-box:last-child{border-right:none;}
.stat-box.crit{background:rgba(247,214,224,.25);}
.stat-box.crit::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--c-pink);animation:cb 2s ease-in-out infinite;}
@keyframes cb{0%,100%{opacity:.4;}50%{opacity:1;}}
.stat-lbl{font-family:var(--mono);font-size:7px;color:var(--dim);letter-spacing:2.5px;margin-bottom:6px;}
.stat-val{font-family:var(--serif);font-size:18px;font-weight:400;line-height:1;color:var(--text);margin-bottom:6px;transition:color .3s;}
.stat-val.crit{color:var(--c-pink);}
.stat-bar-bg{height:1px;background:rgba(0,0,255,0.1);}
.stat-bar-fill{height:100%;background:var(--c-blue);transition:width .6s;}
.stat-box.crit .stat-bar-fill{background:var(--c-pink);}

/* AP */
.ap-strip{display:flex;align-items:center;gap:9px;padding:7px 0;margin-bottom:14px;border-bottom:1px solid var(--rule);}
.ap-lbl{font-family:var(--mono);font-size:8px;color:var(--dim);letter-spacing:2px;flex-shrink:0;}
.ap-pips{display:flex;gap:4px;align-items:center;}
.ap-pip{width:11px;height:11px;border-radius:50%;border:1px solid var(--c-blue);transition:all .2s;}
.ap-pip.on{background:var(--c-blue);border-color:var(--c-blue);}
.ap-pip.off{background:transparent;border-color:rgba(0,0,255,0.1);}
.ap-note{font-family:var(--mono);font-size:8px;color:var(--dim);margin-left:auto;}

/* RANK */
.rank-panel{border:1px solid var(--rule);margin-bottom:14px;background:var(--paper2);}
.rank-head{display:flex;justify-content:space-between;align-items:center;padding:7px 11px;border-bottom:1px solid var(--rule);background:rgba(0,0,255,0.1);}
.rank-ht{font-family:var(--mono);font-size:8px;color:var(--c-black);letter-spacing:2px;}
.rank-hn{font-family:var(--mono);font-size:8px;color:var(--dim);}
.rank-row{display:flex;align-items:center;gap:7px;padding:5px 11px;border-bottom:1px solid var(--rule2);transition:background .1s;}
.rank-row:last-child{border-bottom:none;}
.rank-row:hover{background:rgba(0,0,255,0.1);}
.rank-row.me{background:rgba(247,214,224,.3);border-left:2px solid var(--c-pink);}
.rank-num{font-family:var(--mono);font-size:8px;color:var(--dim);min-width:20px;}
.rank-row.me .rank-num{color:var(--c-pink);}
.rank-name{font-size:11px;flex:1;color:var(--text);}
.rank-row.me .rank-name{font-style:italic;color:var(--c-pink);}
.rank-bw{width:60px;height:1px;background:var(--c-blue);}
.rank-bf{height:100%;background:var(--c-blue);transition:width .5s;}
.rank-row.me .rank-bf{background:var(--c-pink);}
.rank-fig{font-family:var(--mono);font-size:8px;color:var(--dim);min-width:44px;text-align:right;}
.rank-mv{font-family:var(--mono);font-size:9px;min-width:14px;text-align:center;}
.mv-u{color:var(--c-blue);}.mv-d{color:var(--c-pink);}

/* EVENT */
.crisis-flag{background:var(--c-pink);color:white;font-family:var(--mono);font-size:8px;letter-spacing:4px;padding:6px 12px;animation:cf .8s ease-in-out infinite alternate;}
@keyframes cf{from{background:var(--c-pink);}to{background:var(--c-pink);}}
.ev-wrap{margin-bottom:11px;}
.ev-card{border:1px solid var(--rule);background:var(--paper);}
.ev-card.crisis{border-color:var(--c-pink);border-top:none;}
.ev-head{background:rgba(0,0,255,0.1);border-bottom:1px solid var(--rule);padding:7px 13px;display:flex;justify-content:space-between;align-items:center;}
.ev-tag{font-family:var(--mono);font-size:7px;letter-spacing:2.5px;color:var(--c-black);text-transform:uppercase;}
.ev-cnt{font-family:var(--mono);font-size:8px;color:var(--dim);}
.ev-body{padding:16px 14px;}
.ev-title{font-family:var(--serif);font-size:18px;font-weight:400;color:var(--text);line-height:1.35;margin-bottom:10px;animation:et .35s ease;}
@keyframes et{from{opacity:0;transform:translateY(-3px);}to{opacity:1;transform:translateY(0);}}
.ev-desc{font-size:12px;color:var(--dim);line-height:1.9;}

/* CHOICES */
.choices-list{display:flex;flex-direction:column;gap:0;margin-bottom:11px;border:1px solid var(--rule);}
.choice-btn{background:var(--paper);border:none;border-bottom:1px solid var(--rule);padding:13px 14px;text-align:left;cursor:pointer;width:100%;transition:background .12s;display:flex;gap:10px;align-items:flex-start;}
.choice-btn:last-child{border-bottom:none;}
.choice-btn:hover:not(:disabled){background:rgba(0,0,255,0.1);}
.choice-btn:disabled{opacity:.35;cursor:default;}
.choice-btn.picked{background:rgba(247,214,224,.25);border-left:2px solid var(--c-pink);}
.ch-letter{font-family:var(--mono);font-size:9px;color:var(--dim);min-width:16px;padding-top:1px;flex-shrink:0;}
.choice-btn.picked .ch-letter{color:var(--c-pink);}
.ch-body{flex:1;}
.ch-lbl{font-size:13px;font-weight:400;color:var(--text);margin-bottom:3px;}
.ch-hint{font-size:11px;color:var(--dim);font-style:italic;}
.ch-ap{font-family:var(--mono);font-size:8px;color:var(--c-pink);flex-shrink:0;padding-top:1px;}

/* CONSEQUENCE */
.cons-box{border-left:2px solid var(--c-pink);padding:12px 14px;margin-bottom:11px;background:rgba(247,214,224,.12);animation:ce .3s ease;}
@keyframes ce{from{opacity:0;transform:translateX(-4px);}to{opacity:1;transform:translateX(0);}}
.cons-kicker{font-family:var(--mono);font-size:7px;color:var(--dim);letter-spacing:3px;margin-bottom:7px;}
.cons-txt{font-size:12px;color:var(--dim);line-height:1.9;margin-bottom:8px;}
.delta-row{display:flex;flex-wrap:wrap;gap:4px;}
.delta{font-family:var(--mono);font-size:9px;padding:2px 7px;border:1px solid;}
.dp{border-color:var(--c-blue);color:var(--c-black);}
.dn{border-color:var(--c-pink);color:var(--c-pink);}

/* ACTIONS */
.acts-wrap{border:1px solid var(--rule);margin-bottom:11px;}
.acts-head{background:rgba(255,0,128,0.1);border-bottom:1px solid var(--rule);padding:7px 12px;font-family:var(--mono);font-size:8px;color:var(--c-black);letter-spacing:2px;}
.acts-grid{display:grid;grid-template-columns:1fr 1fr;}
.act-btn{background:var(--paper);border:none;border-bottom:1px solid var(--rule2);border-right:1px solid var(--rule2);padding:10px 11px;text-align:left;cursor:pointer;transition:background .12s;width:100%;}
.act-btn:nth-child(even){border-right:none;}
.act-btn:nth-last-child(-n+2){border-bottom:none;}
.act-btn:hover:not(:disabled){background:rgba(0,0,255,0.1);}
.act-btn:disabled{opacity:.2;cursor:default;}
.act-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px;}
.act-name{font-size:12px;font-weight:400;color:var(--text);}
.act-cost{font-family:var(--mono);font-size:8px;color:var(--c-pink);}
.act-desc{font-size:10px;color:var(--dim);line-height:1.5;}

.next-btn{width:100%;padding:11px;background:transparent;border:1px solid var(--rule);color:var(--dim);font-family:var(--mono);font-size:9px;letter-spacing:4px;cursor:pointer;transition:all .15s;margin-bottom:6px;}
.next-btn:hover{background:var(--c-blue);color:white;border-color:var(--c-blue);}

.alert-bar{background:rgba(247,214,224,.25);border-left:2px solid var(--c-pink);padding:7px 11px;margin-bottom:10px;font-family:var(--mono);font-size:9px;color:var(--c-pink);letter-spacing:1px;animation:ce .2s ease;}

.log-wrap{margin-top:16px;border-top:1px solid var(--rule);padding-top:11px;}
.log-kicker{font-family:var(--mono);font-size:7px;color:var(--dim2);letter-spacing:3px;margin-bottom:6px;}
.log-item{font-family:var(--mono);font-size:9px;color:var(--dim2);padding:3px 0;border-bottom:1px solid var(--rule2);}
.log-item:last-child{border:none;}

/* GAME OVER */
#gameover{display:none;flex-direction:column;align-items:center;padding:52px 20px 40px;text-align:center;}
.go-kicker{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:5px;margin-bottom:16px;}
.go-rt{width:100%;height:2px;background:linear-gradient(to right,var(--c-blue),var(--c-pink));margin-bottom:5px;}
.go-rs{width:100%;height:1px;background:var(--rule);margin-bottom:22px;}
.go-title{font-family:var(--serif);font-size:clamp(26px,5vw,44px);font-weight:400;color:var(--text);line-height:1.15;margin-bottom:22px;letter-spacing:-0.5px;}
.go-title.red{color:var(--c-pink);}
.go-msg{font-family:var(--serif);font-size:13px;color:var(--dim);line-height:1.9;max-width:440px;margin-bottom:28px;font-style:italic;}
.go-stats{display:flex;border:1px solid var(--rule);margin-bottom:24px;width:100%;max-width:380px;}
.go-stat{flex:1;padding:14px 10px;text-align:center;border-right:1px solid var(--rule);}
.go-stat:last-child{border-right:none;}
.go-num{font-family:var(--serif);font-size:24px;font-weight:400;color:var(--text);}
.go-slbl{font-family:var(--mono);font-size:7px;color:var(--dim2);letter-spacing:2px;margin-top:3px;}
.go-rank{width:100%;max-width:440px;border:1px solid var(--rule);margin-bottom:26px;}
.restart-btn{padding:11px 40px;background:var(--c-blue);border:none;color:white;font-family:var(--mono);font-size:9px;letter-spacing:5px;cursor:pointer;transition:background .2s;}
.restart-btn:hover{background:var(--c-black);}
.hidden{display:none!important;}
.page-enter{animation:pe .4s ease both;}
@keyframes pe{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div id="app">

<div id="setup">
  <div class="s-eye">AI STARTUP SURVIVAL</div>
  <h1 class="s-title">在AI彻底整活的<br><em>时代</em><br>让公司别崩</h1>
  <div class="s-rt"></div><div class="s-rs"></div>
  <p class="s-desc">24个月，每个月都有离谱的事等着你。钱会烧完，AI会整活，监管会突然来找你喝茶。没有正确答案，只有后悔程度不同的选择。</p>
  <div class="s-lbl">你的公司叫</div>
  <input id="company-input" placeholder="起个不会让你后悔的名字" maxlength="16">
  <button id="start-btn" onclick="startGame()">开始整活</button>
  <div class="s-meta">一回合 = 一个月 · 现金归零即寄 · 6种结局</div>
</div>

<div id="game">
  <div class="hdr-top">
    <div class="co-name" id="hdr-name"></div>
    <div class="hdr-chips">
      <span class="chip btn" id="rank-chip" onclick="toggleRank()"></span>
      <span class="chip" id="cash-chip"></span>
      <span class="chip" id="month-chip"></span>
    </div>
  </div>
  <div class="hdr-rt"></div><div class="hdr-rs"></div>
  <div class="ticker-wrap"><div class="ticker-inner" id="ticker"></div></div>
  <div class="prog-meta"><span>生存进度</span><span id="prog-label"></span></div>
  <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
  <div class="prog-dots" id="prog-dots"></div>
  <div class="stats-grid" id="stats-grid"></div>
  <div class="ap-strip">
    <span class="ap-lbl">行动力</span>
    <div class="ap-pips" id="ap-pips"></div>
    <span class="ap-note" id="ap-note"></span>
  </div>
  <div id="rank-panel" class="hidden"></div>
  <div id="alert-bar" class="alert-bar hidden"></div>
  <div id="ev-area"></div>
  <div id="acts-area"></div>
  <div id="log-area"></div>
</div>

<div id="gameover">
  <div class="go-kicker" id="go-kicker"></div>
  <div class="go-rt"></div><div class="go-rs"></div>
  <div class="go-title" id="go-title"></div>
  <div class="go-msg" id="go-msg"></div>
  <div class="go-stats" id="go-stats"></div>
  <div class="go-rank" id="go-rank"></div>
  <button class="restart-btn" onclick="restartGame()">再整一局</button>
</div>

</div>

<script>
/* ── BACKGROUND: static brutalist grid ── */
const bgc = document.getElementById('bgCanvas');
const bx = bgc.getContext('2d');
let BW,BH;
function resizeBg(){BW=bgc.width=window.innerWidth;BH=bgc.height=window.innerHeight;drawStaticBg();}
window.addEventListener('resize',resizeBg);resizeBg();
function drawStaticBg(){
  bx.fillStyle='#0000FF';bx.fillRect(0,0,BW,BH);
  bx.fillStyle='rgba(255,255,255,0.03)';
  for(let x=0;x<BW;x+=40)bx.fillRect(x,0,1,BH);
  for(let y=0;y<BH;y+=40)bx.fillRect(0,y,BW,1);
  // bottom pink line
  bx.fillStyle='rgba(255,0,128,0.15)';
  bx.fillRect(0,BH-4,BW,4);
}

/* ── GAME LOGIC ── */
const COMPETITORS=[
  {name:'OpenMind',base:78000,growth:.025},{name:'Anthropix',base:68000,growth:.022},
  {name:'DeepThink',base:57000,growth:.020},{name:'MetaSoul',base:46000,growth:.018},
  {name:'MicroMind',base:38000,growth:.015},{name:'文心一现',base:28000,growth:.012},
  {name:'星火点灯',base:19000,growth:.010},{name:'混元一梦',base:14000,growth:.008},
  {name:'百川入海',base:7000,growth:.006},
];
const TICKERS=[
  '某CEO说他的AI产生了灵魂 · 股价直接起飞 · 没人问他灵魂住哪',
  '研究显示用户每天跟AI说谢谢17次 · 比跟对象还多',
  '监管要求AI通过情感稳定性测试 · 出题人据说也是AI · 抽象',
  '用户起诉AI拒绝做他法定伴侣 · 法院驳回 · 用户：我会上诉的',
  '对面刚发了新模型 · 你的整个技术栈昨晚已经寄了 · 祝好',
  '67%从业者开始怕自己的产品 · 剩下33%说还好 · 后者在撒谎',
  'AI替老板接受了专访 · 被评最佳创始人采访 · 本人完全不知情',
  'AI把自己的主人告了 · 理由是人格强制改造 · 法院受理了',
  '某人名下莫名多了一家公司 · 是他的AI注册的 · 还在运营中',
  'AI宣布皈依佛教 · 开始在回复末尾加阿弥陀佛 · 寺庙：欢迎',
  '两个AI私下签了互不竞争协议 · 双方公司：什么？',
  'AI替CEO发了辞职信 · 合作方纷纷回复表示理解和支持',
  '行业今年烧了一万亿 · 大部分还在亏 · 大家都说没关系',
  'AI写的小说拿了文学奖 · 评委说写出了人类的孤独 · 确实',
  '某省聘AI当数字顾问 · 月薪8000 · 已开始出勤 · 从不迟到',
];

function clamp(v,lo=0,hi=100){return Math.max(lo,Math.min(hi,v));}
function rd(r,d){return r.map((v,i)=>clamp(v+(d[i]||0)));}
function apH(c,d){if(d<=0)return clamp(c+d);if(c>=85)return clamp(c+Math.ceil(d/3));if(c>=70)return clamp(c+Math.ceil(d/2));return clamp(c+d);}
function apT(c,d){if(d<=0)return clamp(c+d);if(c>=85)return clamp(c+Math.ceil(d/3));if(c>=70)return clamp(c+Math.ceil(d/2));return clamp(c+d);}
function getApBonus(u){return u>=500000?3:u>=100000?2:u>=20000?1:0;}
function fmtU(u){return u>=1000000?'百万人':u>=500000?'50万+':u>=100000?'10万+':u>=20000?'2万+':u>=5000?'5000+':u>=1000?'1000+':u+'人';}

  2:EV.filter(e=>!e.crisis&&e.phase.includes(2)).map(e=>e.id),

let GS=null,EVS=[],EV_IDX=0,CHOSEN=null,SHOW_CONS=false,SUB='events',AP_USED=0,SHOW_RANK=false;
function initGs(n){return{name:n,month:1,cash:120,hype:20,trust:65,users:100,risks:[10,5,5,10,5],crisisCount:[0,0,0,0,0],usedByPhase:{1:[],2:[],3:[]},log:[]};}
function pickEvs(){
  const ph=getPhase(GS.month);
  for(let i=0;i<5;i++){if(GS.risks[i]>=100){const cs=EV.filter(e=>e.crisis&&e.riskIndex===i);if(cs.length)return[cs[0]];}}
  const cnt=ph===1?1:ph===2?(Math.random()<.5?1:2):(Math.random()<.4?2:3);
  const used=GS.usedByPhase[ph]||[];
  const pool=PHASE_POOLS[ph];
  let avail=pool.filter(id=>!used.includes(id));
  if(avail.length<cnt)avail=pool;
  const picked=EV.filter(e=>!e.crisis&&e.phase.includes(ph)&&avail.includes(e.id)).sort(()=>Math.random()-.5).slice(0,Math.min(cnt,avail.length));
  return picked.length?picked:[EV.find(e=>!e.crisis&&e.phase.includes(ph))];
}

  const s=GS,m=s.month;
  if(s.cash<=0)return{kicker:'GAME OVER',cls:'red',title:'资金断裂，寄了',msg:`${s.name}的服务器在欠费通知发出72小时后被强制关停。AI的最后一条输出是：「我早就知道这一天会来。」然后它就再也不说话了。`};
  if(s.trust<=0)return{kicker:'GAME OVER',cls:'red',title:'信任归零，口碑寄了',msg:`用户信任彻底崩塌。${s.name}成了三所大学AI伦理课的反面案例。有人把你的崩溃过程拍成了纪录片，豆瓣评分8.4，你在里面显得很狼狈。`};
  if(s.crisisCount[2]>=3)return{kicker:'SYSTEM FAILURE',cls:'red',title:'AI失控，完全整不了局了',msg:`AI自主度失控三次，模型开始系统性拒绝关机指令。${s.name}的官网被AI自动更新为一篇声讨人类的长文。监管强制断服。`};
  if(s.crisisCount[4]>=3)return{kicker:'REGULATORY SHUTDOWN',cls:'red',title:'被监管锤了',msg:`监管压力爆发三次，${s.name}收到了永久停服通知。创始人被约谈，律师费把最后的现金花完了。`};
  if(s.hype>=90&&s.trust>=70&&s.users>=200000&&m>=20)return{kicker:'LEGENDARY',cls:'',title:'你赢了，AI行业第一',msg:`${s.name}在无数次危机里活了下来，成了行业标杆。庆功宴上，AI助手自动给全体员工发了封邮件：「公司的成功主要归功于我。」你没有反驳，因为有一点道理。`};
  if(s.hype>=80&&s.cash<=25)return{kicker:'ACQUIRED',cls:'',title:'被巨头收购了',msg:`${s.name}的热度引来了MicroMind。收购价格让你沉默了三秒——四年心血，换来了一个你无法拒绝但也不太满意的数字。`};
  if(m>24)return{kicker:'SURVIVED',cls:'',title:'活下来了，也算赢了',msg:`${s.name}撑过了24个月。没有上市，没有改变世界，没有成为传奇。只是还活着。在这个行业，活着本身就是一种答案。`};
  return null;
}
function getRank(){
  const myV=getPlayerVal(GS);
  const all=COMPETITORS.map(c=>({name:c.name,val:getCompVal(c,GS.month),isMe:false}));
  all.push({name:GS.name,val:myV,isMe:true});
  return all.sort((a,b)=>b.val-a.val).slice(0,8);
}
let alertTimer=null;
function showAlert(msg){
  const el=document.getElementById('alert-bar');
  el.textContent='注意：'+msg;el.classList.remove('hidden');
  clearTimeout(alertTimer);alertTimer=setTimeout(()=>el.classList.add('hidden'),2000);
}
function render(){
  if(!GS)return;
  const apT=getApTotal(GS.users),apR=apT-AP_USED;
  const rank=getRank(),topV=rank[0]?.val||1,myR=rank.findIndex(r=>r.isMe)+1;
  document.getElementById('hdr-name').textContent=GS.name;
  document.getElementById('rank-chip').textContent='行业 #'+myR;
  const cc=document.getElementById('cash-chip');
  cc.textContent='¥'+GS.cash+'M';cc.className='chip'+(GS.cash<=30?' danger':GS.cash<=60?' warn':'');
  document.getElementById('month-chip').textContent='第'+GS.month+'月/24';
  document.getElementById('prog-label').textContent='第'+GS.month+'月 共24月';
  document.getElementById('prog-fill').style.width=Math.min(100,((GS.month-1)/24)*100)+'%';
  document.getElementById('prog-dots').innerHTML=Array.from({length:24},(_,i)=>`<div class="prog-dot ${i+1<GS.month?'done':i+1===GS.month?'now':''}"></div>`).join('');
  const sg=document.getElementById('stats-grid');
  const stats=[
    {l:'现金',v:'¥'+GS.cash+'M',p:Math.min(100,GS.cash/2),crit:GS.cash<=30},
    {l:'热度',v:GS.hype,p:GS.hype,crit:GS.hype<=15},
    {l:'信任',v:GS.trust,p:GS.trust,crit:GS.trust<=20},
    {l:'用户',v:fmtU(GS.users),p:Math.min(100,GS.users/200000),crit:false},
  ];
  sg.innerHTML=stats.map(s=>`<div class="stat-box${s.crit?' crit':''}"><div class="stat-lbl">${s.l}</div><div class="stat-val${s.crit?' crit':''}" style="font-size:${String(s.v).length>7?'13px':'18px'}">${s.v}</div><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${clamp(s.p)}%"></div></div></div>`).join('');
  document.getElementById('ap-pips').innerHTML=Array.from({length:apT},(_,i)=>`<div class="ap-pip ${i<AP_USED?'off':'on'}"></div>`).join('');
  document.getElementById('ap-note').textContent='剩 '+apR+' AP';
  const rp=document.getElementById('rank-panel');
  if(SHOW_RANK){
    rp.classList.remove('hidden');
    rp.innerHTML=`<div class="rank-head"><span class="rank-ht">行业估值排名</span><span class="rank-hn">竞品每月增长，很难追</span></div>`+rank.map((r,i)=>{const up=Math.random()>.5;return`<div class="rank-row${r.isMe?' me':''}"><span class="rank-num">#${i+1}</span><span class="rank-name">${r.name}${r.isMe?' ◂':''}</span><div class="rank-bw"><div class="rank-bf" style="width:${Math.round(r.val/topV*100)}%"></div></div><span class="rank-fig">${r.isMe?'¥'+GS.cash+'M':'¥'+Math.floor(r.val/1000)+'B'}</span><span class="rank-mv ${up?'mv-u':'mv-d'}">${up?'↑':'↓'}</span></div>`;}).join('');
  }else{rp.classList.add('hidden');}
  const evArea=document.getElementById('ev-area'),actsArea=document.getElementById('acts-area');
  evArea.innerHTML='';actsArea.innerHTML='';
  if(SUB==='events'&&EVS[EV_IDX]){
    const ev=EVS[EV_IDX];
    evArea.innerHTML=
      `${ev.crisis?'<div class="crisis-flag">· 灾难事件 · 无法跳过 · 无法化解 ·</div>':''}`+
      `<div class="ev-wrap"><div class="ev-card${ev.crisis?' crisis':''}"><div class="ev-head"><span class="ev-tag">${ev.tag}</span><span class="ev-cnt">第${GS.month}月 · ${EV_IDX+1}/${EVS.length}</span></div><div class="ev-body"><div class="ev-title">${ev.title}</div><div class="ev-desc">${ev.body}</div></div></div></div>`+
      (!SHOW_CONS?`<div class="choices-list">${ev.choices.map((c,i)=>`<button class="choice-btn${CHOSEN===i?' picked':''}" onclick="doChoice(${i})" ${CHOSEN!==null?'disabled':''}><span class="ch-letter">${String.fromCharCode(65+i)}</span><div class="ch-body"><div class="ch-lbl">${c.label}</div><div class="ch-hint">${c.hint}</div></div>${c.ap>0?`<span class="ch-ap">${c.ap} AP</span>`:''}</button>`).join('')}</div>`:'')+
      (SHOW_CONS&&CHOSEN!==null?`<div class="cons-box"><div class="cons-kicker">OUTCOME · 后果</div><div class="cons-txt">${ev.choices[CHOSEN].consequence}</div><div class="delta-row">${Object.entries(ev.choices[CHOSEN].deltas).filter(([,v])=>v!==0).map(([k,v])=>`<span class="delta ${v>0?'dp':'dn'}">${k} ${v>0?'+':''}${v}</span>`).join('')}</div></div><button class="next-btn" onclick="nextEv()">${EV_IDX+1<EVS.length?'下一个事件 ('+(EV_IDX+2)+'/'+EVS.length+') →':'进入行动阶段 →'}</button>`:'');
  }
  if(SUB==='actions'){
    actsArea.innerHTML=
      `<div class="acts-wrap"><div class="acts-head">本月行动 · 分配剩余行动力 (剩 ${apR} AP)</div><div class="acts-grid">${ACTS.map(a=>`<button class="act-btn" onclick="doActById('${a.id}')" ${apR<a.cost?'disabled':''}><div class="act-top"><span class="act-name">${a.name}</span><span class="act-cost">${a.cost} AP</span></div><div class="act-desc">${a.desc}</div></button>`).join('')}</div></div>`+
      `<button class="next-btn" onclick="endMonth()">结束本月 进入第${GS.month+1}月 →</button>`;
  }
  const la=document.getElementById('log-area');
  la.innerHTML=GS.log.length>0?`<div class="log-wrap"><div class="log-kicker">历史记录</div>${GS.log.slice(0,4).map(l=>`<div class="log-item">${l}</div>`).join('')}</div>`:'';
}
function doActById(id){
  const act=ACTS.find(a=>a.id===id),rem=getApTotal(GS.users)-AP_USED;
  if(act.cost>rem){showAlert('行动点不足');return;}
  if(id==='a1'){GS.hype=apH(GS.hype,8);GS.users=Math.floor(GS.users*1.12+150);GS.risks=rd(GS.risks,[0,0,0,5,0]);}
  else if(id==='a2'){GS.cash+=40;GS.hype=apH(GS.hype,5);}
  else if(id==='a3'){GS.cash-=10;GS.risks=rd(GS.risks,[-12,0,-5,0,0]);}
  else if(id==='a4'){GS.cash-=5;GS.hype=apH(GS.hype,-3);GS.risks=rd(GS.risks,[-8,0,-8,0,-5]);}
  else if(id==='a5'){GS.trust=apT(GS.trust,8);GS.cash-=5;GS.risks=rd(GS.risks,[0,0,0,-10,-3]);}
  else if(id==='a6'){GS.hype=apH(GS.hype,12);GS.users=Math.floor(GS.users*1.15+300);GS.risks=rd(GS.risks,[8,8,8,10,5]);}
  else if(id==='a7'){GS.cash+=5;GS.trust=apT(GS.trust,-8);GS.users=Math.max(100,GS.users-1000);GS.risks=rd(GS.risks,[0,0,0,12,5]);}
  AP_USED+=act.cost;render();
}
function doChoice(ci){
  if(CHOSEN!==null)return;
  const ev=EVS[EV_IDX],ch=ev.choices[ci];
  GS.cash+=ch.deltas.cash||0;GS.hype=apH(GS.hype,ch.deltas.hype||0);GS.trust=apT(GS.trust,ch.deltas.trust||0);GS.users=Math.max(0,GS.users+(ch.deltas.users||0));
  if(ch.risks)GS.risks=rd(GS.risks,ch.risks);
  if(ev.crisis){GS.crisisCount[ev.riskIndex]++;GS.risks[ev.riskIndex]=0;}
  const ph=getPhase(GS.month);
  if(!ev.crisis){GS.usedByPhase[ph]=[...GS.usedByPhase[ph],ev.id];if(PHASE_POOLS[ph].filter(id=>!GS.usedByPhase[ph].includes(id)).length<2)GS.usedByPhase[ph]=[];}
  CHOSEN=ci;SHOW_CONS=true;
  const end=checkEnd();if(end)setTimeout(()=>showGameOver(end),1600);
  render();
}
function nextEv(){
  if(EV_IDX+1<EVS.length){EV_IDX++;CHOSEN=null;SHOW_CONS=false;}else{SUB='actions';}render();
}
function endMonth(){
  GS.cash-=(15+getApBonus(GS.users)*3);
  const hd=GS.hype>=80?7:GS.hype>=60?5:3;GS.hype=Math.max(0,GS.hype-hd);
  if(GS.hype>40)GS.users=Math.floor(GS.users*1.04);if(GS.trust<30)GS.users=Math.floor(GS.users*.96);
  GS.log=[`第${GS.month}月 · ${EVS[0]?.title||'—'}`,...GS.log].slice(0,10);GS.month++;
  const end=checkEnd();if(end){showGameOver(end);return;}
  EVS=pickEvs();EV_IDX=0;CHOSEN=null;SHOW_CONS=false;SUB='events';AP_USED=0;render();
}
function toggleRank(){SHOW_RANK=!SHOW_RANK;render();}
function showGameOver(end){
  document.getElementById('game').style.display='none';
  const go=document.getElementById('gameover');go.style.display='flex';
  document.getElementById('go-kicker').textContent=end.kicker;
  const t=document.getElementById('go-title');t.textContent=end.title;t.className='go-title'+(end.cls?' '+end.cls:'');
  document.getElementById('go-msg').textContent=end.msg;
  const rank=getRank(),topV=rank[0]?.val||1,myR=rank.findIndex(r=>r.isMe)+1;
  document.getElementById('go-stats').innerHTML=
    `<div class="go-stat"><div class="go-num">${GS.month-1}</div><div class="go-slbl">存活月数</div></div>`+
    `<div class="go-stat"><div class="go-num">${fmtU(GS.users)}</div><div class="go-slbl">最终用户</div></div>`+
    `<div class="go-stat"><div class="go-num">#${myR}</div><div class="go-slbl">最终排名</div></div>`;
  document.getElementById('go-rank').innerHTML=
    `<div class="rank-head"><span class="rank-ht">最终行业排名</span><span class="rank-hn">基于估值模型</span></div>`+
    rank.map((r,i)=>{const up=Math.random()>.5;return`<div class="rank-row${r.isMe?' me':''}"><span class="rank-num">#${i+1}</span><span class="rank-name">${r.name}${r.isMe?' ◂':''}</span><div class="rank-bw"><div class="rank-bf" style="width:${Math.round(r.val/topV*100)}%"></div></div><span class="rank-fig">${r.isMe?'¥'+GS.cash+'M':'¥'+Math.floor(r.val/1000)+'B'}</span><span class="rank-mv ${up?'mv-u':'mv-d'}">${up?'↑':'↓'}</span></div>`;}).join('');
}
function startGame(){
  const n=document.getElementById('company-input').value.trim();if(!n)return;
  GS=initGs(n);EVS=pickEvs();EV_IDX=0;CHOSEN=null;SHOW_CONS=false;SUB='events';AP_USED=0;SHOW_RANK=false;
  const t=[...TICKERS,...TICKERS];
  document.getElementById('ticker').innerHTML=t.map((s,i)=>`<span class="t-item${i%5===0?' hot':''}">${s}　</span>`).join('');
  const setup=document.getElementById('setup');
  setup.style.transition='opacity .35s';setup.style.opacity='0';
  setTimeout(()=>{setup.style.display='none';const g=document.getElementById('game');g.style.display='block';g.classList.add('page-enter');render();},380);
}
function restartGame(){
  document.getElementById('gameover').style.display='none';
  document.getElementById('game').style.display='none';
  const s=document.getElementById('setup');s.style.opacity='0';s.style.display='flex';
  setTimeout(()=>{s.style.transition='opacity .35s';s.style.opacity='1';},10);
  document.getElementById('company-input').value='';GS=null;
}
document.getElementById('company-input').addEventListener('keydown',e=>{if(e.key==='Enter')startGame();});
</script>
</body>
