<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Life Survival | 职业人生模拟器</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0000FF;--pink:#FF0080;--white:#fff;--black:#111;
  --text:rgba(0,0,0,.85);--text2:rgba(0,0,0,.55);--text3:rgba(0,0,0,.25);
  --border:rgba(0,0,0,.08);--border-hover:rgba(0,0,0,.15);
  --surface:rgba(0,0,0,.02);--surface-hover:rgba(0,0,0,.04);
  --green:#00aa66;--red:#ee3355;--yellow:#cc9900;
}
body{
  font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--white);color:var(--text);min-height:100vh;
  display:flex;justify-content:center;align-items:flex-start;
  padding:32px 24px;
  line-height:1.6;
}
#app{width:100%;max-width:680px;min-height:100vh;display:flex;flex-direction:column;gap:2px}

#status-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 24px;border:2px solid var(--blue);
  font-size:14px;flex-wrap:wrap;gap:12px;
}
.status-item{display:flex;align-items:center;gap:8px}
.status-label{color:var(--blue);font-size:11px;text-transform:uppercase;letter-spacing:1.5px;opacity:.7}
.status-item span:last-child{font-weight:600;font-size:15px;color:var(--text)}
.economy-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.economy-dot.boom{background:var(--green)}
.economy-dot.stable{background:var(--yellow)}
.economy-dot.recession{background:var(--red)}

#main-content{
  flex:1;border:1px solid var(--border);
  padding:40px 36px;min-height:480px;
}
#main-content h2{font-size:24px;margin-bottom:14px;color:var(--black);font-weight:700}
.narrative{line-height:2;margin:18px 0;color:var(--text2);font-size:15px}

.score-display{text-align:center;font-size:80px;font-weight:900;color:var(--blue);margin:24px 0;letter-spacing:-3px}
.score-label{text-align:center;color:var(--text3);font-size:12px;margin-bottom:8px;letter-spacing:3px;text-transform:uppercase}

.year-tag{
  display:inline-block;border:1px solid var(--blue);color:var(--blue);
  font-size:13px;padding:4px 14px;margin-bottom:14px;font-weight:600;
}
.event-tag{display:inline-block;font-size:11px;padding:3px 12px;margin-bottom:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.event-tag.crisis{border:1px solid var(--red);color:var(--red)}
.event-tag.opportunity{border:1px solid var(--green);color:var(--green)}

.news-card{
  border:1px solid var(--border);border-left:4px solid var(--blue);
  padding:18px 20px;margin:16px 0;
}
.news-card.opportunity{border-left-color:var(--green)}
.news-card.crisis{border-left-color:var(--red)}
.news-card .news-icon{font-size:22px;margin-bottom:8px}
.news-card .news-text{color:var(--text);line-height:1.9;font-size:15px}
.news-card .news-reaction{color:var(--text3);font-size:13px;margin-top:10px;font-style:italic}

.btn-group{display:flex;flex-direction:column;gap:8px;margin-top:24px}
.btn{
  display:block;width:100%;padding:16px 20px;
  background:transparent;color:var(--text);border:1px solid var(--border);
  font-size:15px;cursor:pointer;text-align:left;transition:all .2s ease;
  font-family:inherit;
}
.btn:hover{background:var(--pink);border-color:var(--pink);color:var(--white)}
.btn:active{background:var(--pink);opacity:.8}
.btn .btn-title{font-weight:600;font-size:15px}
.btn .btn-sub{font-size:12px;color:var(--text3);margin-top:3px}
.btn.disabled{opacity:.2;cursor:not-allowed;pointer-events:none}
.btn.disabled:hover{background:transparent;border-color:var(--border);color:var(--text)}
.btn.primary{
  background:var(--blue);color:var(--white);text-align:center;font-weight:700;border-color:var(--blue);
}
.btn.primary:hover{background:var(--pink);color:var(--white);border-color:var(--pink)}

.slider-group{margin:24px 0}
.slider-group input[type=range]{width:100%;accent-color:var(--pink);height:6px}
.slider-row{display:flex;justify-content:space-between;align-items:center;gap:16px}
.slider-val{font-size:32px;font-weight:900;color:var(--black);min-width:60px;text-align:center}

.major-category{border:1px solid var(--border);margin-bottom:4px}
.major-category .cat-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 16px;cursor:pointer;user-select:none;
}
.major-category .cat-header:hover{background:var(--surface)}
.major-category .cat-name{font-weight:600;font-size:15px}
.major-category .cat-sub{font-size:11px;color:var(--text3)}
.major-category .cat-body{padding:0 16px 14px;display:none}
.major-category.open .cat-body{display:block}
.major-item{
  display:inline-block;padding:7px 14px;margin:4px 5px;
  border:1px solid var(--border);font-size:14px;cursor:pointer;transition:all .2s;
}
.major-item:hover{border-color:var(--pink);color:var(--pink)}
.major-item.locked{opacity:.2;cursor:not-allowed;text-decoration:line-through}
.major-item.locked:hover{border-color:var(--border);color:var(--text)}
.major-item.selected{border-color:var(--pink);color:var(--pink);background:rgba(255,0,128,.05)}

.attr-row{display:flex;gap:2px}
.attr-card{
  flex:1;border:1px solid var(--border);
  padding:14px 16px;text-align:center;
}
.attr-card .attr-label{font-size:10px;color:var(--text3);margin-bottom:6px;letter-spacing:2px;text-transform:uppercase}
.attr-card .attr-val{font-size:16px;font-weight:600;color:var(--black)}

.history-panel{margin-top:24px;border-top:1px solid var(--border);padding-top:16px}
.history-toggle{color:var(--text3);font-size:13px;cursor:pointer;user-select:none}
.history-toggle:hover{color:var(--pink)}
.history-list{display:none;margin-top:12px;font-size:13px;color:var(--text3);line-height:2.2}
.history-list.open{display:block}
.history-item{padding:3px 0;border-bottom:1px solid var(--border)}

#transition-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;
  background:var(--white);display:flex;flex-direction:column;
  justify-content:center;align-items:center;animation:fadeIn .3s ease-out;
}
#transition-overlay.fade-out{animation:fadeOut .5s ease-in forwards}
#transition-overlay .trans-year{font-size:80px;font-weight:900;color:var(--black);margin-bottom:10px;letter-spacing:-4px}
#transition-overlay .trans-title{font-size:20px;color:var(--text2);margin-bottom:6px;letter-spacing:3px}
#transition-overlay .trans-sub{font-size:15px;color:var(--pink)}
#transition-overlay .trans-bar{width:80px;height:2px;background:var(--blue);margin-top:28px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
.fade-in{animation:fadeIn .35s ease-out}

.ending-card{text-align:center;padding:40px 0}
.ending-card .ending-title{font-size:40px;font-weight:900;color:var(--black);margin-bottom:24px;letter-spacing:-2px}
.ending-card .ending-narrative{line-height:2.3;color:var(--text2);margin-bottom:32px;font-size:16px}
.ending-card .ending-panel{border:1px solid var(--border);padding:24px;margin-bottom:28px}
.ending-card .ending-panel .row{display:flex;justify-content:space-around;margin:8px 0}
.ending-card .ending-panel .stat{text-align:center}
.ending-card .ending-panel .stat-val{font-size:28px;font-weight:900;color:var(--black)}
.ending-card .ending-summary{font-size:19px;color:var(--text);margin:24px 0;font-weight:600}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border)}

/* Tablet */
@media(max-width:768px){
  body{padding:20px 16px}
  #app{max-width:100%}
  #main-content{padding:32px 24px;min-height:400px}
  #main-content h2{font-size:22px}
  .score-display{font-size:64px}
  #transition-overlay .trans-year{font-size:64px}
  .ending-card .ending-title{font-size:32px}
}

/* Mobile */
@media(max-width:480px){
  body{padding:12px 8px}
  #status-bar{padding:12px 16px;font-size:12px;gap:8px}
  .status-item span:last-child{font-size:13px}
  #main-content{padding:24px 16px;min-height:360px}
  #main-content h2{font-size:20px}
  .narrative{font-size:14px;line-height:1.8;margin:14px 0}
  .score-display{font-size:52px;letter-spacing:-1px}
  .score-label{font-size:10px;letter-spacing:2px}
  .btn{padding:14px 16px;font-size:14px}
  .btn .btn-title{font-size:14px}
  .btn-group{gap:6px;margin-top:18px}
  .major-category .cat-header{padding:12px 14px}
  .major-category .cat-name{font-size:14px}
  .major-item{padding:6px 10px;margin:3px;font-size:13px}
  .attr-card{padding:10px 12px}
  .attr-card .attr-val{font-size:14px}
  .year-tag{font-size:11px;padding:3px 10px}
  .news-card{padding:14px;margin:12px 0}
  .news-card .news-text{font-size:14px}
  .ending-card{padding:20px 0}
  .ending-card .ending-title{font-size:28px;letter-spacing:-1px}
  .ending-card .ending-narrative{font-size:14px}
  .ending-card .ending-panel .stat-val{font-size:22px}
  #transition-overlay .trans-year{font-size:48px;letter-spacing:-2px}
  #transition-overlay .trans-title{font-size:16px}
  #transition-overlay .trans-sub{font-size:13px}
  #transition-overlay .trans-bar{width:50px}
  .slider-val{font-size:24px}
}
</style>
</style>
</head>
<body>
<div id="app"></div>
<div id="transition-overlay" style="display:none"></div>
<script>
// ============================================================
// Career Life Survival | 职业人生模拟器 v2.3
// ============================================================

const state = {
  chapter:'prologue', age:18, year:2018, score:0,
  majorCat:null, majorName:null,
  scorePenalty:false, hasPostgrad:false,
  path:null, gapYears:0, gapAttempts:0, gapResult:null,
  careerYear:0, careerDirection:null,
  careerNode:1, // 1=第1年, 2=第2年, 3=第3年, 5=第5年, 7=第7年, 10=第10年, 15,20,25,30,35,40
  careerEvent:null,
  careerResult:null, // {type, title, icon, text, nextNode}
  wealth:50, stability:50, stress:20,
  economy:'stable', economyLabel:'平稳',
  history:[],
  choices:{
    node1:null,node2:null,node3:null,node7:null,node10:null,node15:null,node20:null,
    changedCareer:false,changedCareerSuccess:false,
    startedBusiness:false,freelance:false,sideHustle:false,
    civilSuccess:false,postgradSuccess:false,
  },
  endingType:null,
  eventQueue:[], // 待触发的事件
};

// --- 工具 ---
function rng(min,max){return Math.floor(Math.random()*(max-min+1))+min}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}
function normalRandom(mean,std){let u1=Math.random(),u2=Math.random();return clamp(Math.round(mean+Math.sqrt(-2*Math.log(u1))*Math.cos(2*Math.PI*u2)),400,750)}

// --- 专业 ---
const MAJORS=[
  {cat:'理学',recScore:550,sub:['数学','物理学','化学','生物科学','统计学','其他'],changeGroup:'wide'},
  {cat:'工学',recScore:500,sub:['计算机科学与技术','电气工程','机械工程','材料科学','土木工程','化学工程','其他'],changeGroup:'wide'},
  {cat:'医学',recScore:580,sub:['临床医学','药学','护理学','公共卫生','其他'],changeGroup:'restricted'},
  {cat:'经济学',recScore:550,sub:['经济学','国际贸易','统计学','金融学','其他'],changeGroup:'mid'},
  {cat:'管理学',recScore:500,sub:['工商管理','会计学','人力资源管理','物流管理','其他'],changeGroup:'mid'},
  {cat:'法学',recScore:520,sub:['法学','政治学','社会学','国际关系','其他'],changeGroup:'mid'},
  {cat:'文学/语言',recScore:500,sub:['汉语言文学','英语','翻译','新闻传播','其他'],changeGroup:'mid'},
  {cat:'历史/哲学',recScore:500,sub:['历史学','哲学','考古学','其他'],changeGroup:'restricted'},
  {cat:'艺术',recScore:500,sub:['平面设计','视觉传达','音乐','影视编导','其他'],changeGroup:'restricted'},
  {cat:'教育/师范',recScore:500,sub:['教育学','小学教育','学前教育','心理学','其他'],changeGroup:'mid'},
  {cat:'农林',recScore:400,sub:['农学','林学','动物科学','食品科学','其他'],changeGroup:'restricted'},
  {cat:'体育',recScore:400,sub:['体育教育','运动训练','社会体育','其他'],changeGroup:'restricted'},
  {cat:'军事/公安',recScore:580,sub:['国防生','警察学院','消防工程','其他'],changeGroup:'restricted',lockScore:580},
];
function getMajorData(n){return MAJORS.find(m=>m.cat===n)}
function getAIImpact(c){
  const m=getMajorData(c);if(!m)return'mid';
  if(m.changeGroup==='wide')return'low';if(m.changeGroup==='mid')return'mid';return'high';
}

// --- 经济 ---
const ECON=[{id:'boom',label:'景气',icon:'🟢'},{id:'stable',label:'平稳',icon:'🟡'},{id:'recession',label:'低迷',icon:'🔴'}];
function refreshEconomy(){const r=Math.random();state.economy=r<0.3?'boom':r<0.7?'stable':'recession';state.economyLabel=ECON.find(e=>e.id===state.economy).label}

// --- 属性 ---
function wealthLabel(){if(state.careerYear<=5&&state.chapter==='career')return'月光';if(state.choices.startedBusiness&&state.wealth>=95)return'财富自由';if(state.wealth>=90)return'千万';if(state.wealth>=75)return'百万';if(state.wealth>=25)return'十万';return'月光'}
function stabilityLabel(){if(state.stability<20)return'岌岌可危';if(state.stability<60)return'站稳了脚跟';return'铁打的位置'}
function stressLabel(){if(state.stress<30)return'岁月静好';if(state.stress<65)return'有点焦虑';return'快撑不住了'}

// --- 惩罚/加成 ---
function penalty(){return state.scorePenalty?0.15:0}
function pgBonus(){return state.hasPostgrad?1.3:1.0}
function wealthSlow(){return state.scorePenalty?0.6:1.0}

// --- 转行 ---
function getChangeOptions(){
  const m=getMajorData(state.majorCat);const g=m?m.changeGroup:'mid';
  if(g==='wide')return[{name:'AI产品经理',baseRate:70},{name:'数据分析师',baseRate:75},{name:'金融科技',baseRate:55},{name:'技术管理',baseRate:80}];
  if(g==='mid')return[{name:'运营/品牌策划',baseRate:65},{name:'财富管理顾问',baseRate:55},{name:'教育培训',baseRate:70},{name:'自媒体创业',baseRate:40}];
  return[{name:'体制内（考编/考公）',baseRate:60},{name:'服务业管理',baseRate:65},{name:'自媒体',baseRate:35},{name:'考研换专业',baseRate:50}];
}

// --- 职业方向 ---
function getDirections(){
  const m=getMajorData(state.majorCat);
  if(m&&m.changeGroup==='restricted'){
    return state.hasPostgrad?['本专业高级岗位','考虑转行']:['本专业相关工作','考虑转行'];
  }
  let b=[];
  switch(state.majorCat){
    case'工学':b=['前端/后端开发','算法工程师','产品经理','数据分析师'];break;
    case'理学':b=['数据分析师','科研助理','教育培训','金融量化'];break;
    case'经济学':b=['金融分析师','经济研究员','数据运营','投行助理'];break;
    case'管理学':b=['管理培训生','人力资源','市场运营','咨询顾问'];break;
    case'法学':b=['律师助理','法务专员','合规岗','公证员助理'];break;
    case'文学/语言':b=['内容编辑','新媒体运营','翻译','文案策划'];break;
    case'教育/师范':b=['中小学教师','培训讲师','教育产品','课程研发'];break;
    default:b=['专业对口岗位','通用管理岗','自由职业'];
  }
  if(state.hasPostgrad){const e={工学:['AI研究员','高级架构师','技术总监助理'],理学:['数据科学家','量化研究员','实验室主管'],经济学:['宏观研究员','投行经理','首席分析师'],管理学:['战略顾问','CEO助理','高级项目经理'],法学:['执业律师','法务经理','政策研究员']};b=[...(e[state.majorCat]||['高级研究岗','项目管理岗','技术专家岗']),...b]}
  return b;
}

// --- 危机/机遇事件池 ---
const CRISIS_EVENTS=[
  {text:'公司宣布裁员，你的部门被列入名单。',icon:'🔴',tag:'危机',
    opts:[
      {label:'疯狂加班保住位置',eff:()=>{state.stability+=5;state.stress+=20}},
      {label:'趁这个机会多陪陪家人，听天由命',eff:()=>{state.stability-=15;state.stress-=5}},
    ]},
  {text:'AI接管了你日常工作的40%，老板找你谈话。',icon:'🤖',tag:'危机',
    opts:[
      {label:'拼命学AI，周末报班充电',eff:()=>{state.stability+=8;state.stress+=15}},
      {label:'算了，周末去爬山，工作的事再说',eff:()=>{state.stability-=10;state.stress-=10}},
    ]},
  {text:'行业龙头倒闭，整个行业开始洗牌。',icon:'💥',tag:'危机',
    opts:[
      {label:'疯狂投简历，接触新行业',eff:()=>{state.stability-=5;state.stress+=12}},
      {label:'回老家待一阵子，陪陪父母',eff:()=>{state.stability-=20;state.stress-=8}},
    ]},
  {text:'你负责的大项目黄了，上面开始追究责任。',icon:'📉',tag:'危机',
    opts:[
      {label:'住进公司，亲手把项目救回来',eff:()=>{state.stability+=5;state.stress+=20;state.wealth+=5}},
      {label:'该我的责任我认，但下班时间是我的',eff:()=>{state.stability-=12;state.stress+=5}},
    ]},
  {text:'比你年轻十岁的同事用AI完成了你一周的工作量。',icon:'😰',tag:'危机',
    opts:[
      {label:'咬牙学AI，哪怕从零开始',eff:()=>{state.stability+=5;state.stress+=10}},
      {label:'接受自己的节奏，把擅长的做到极致',eff:()=>{state.stability+=3;state.stress-=3}},
    ]},
];
const OPP_EVENTS=[
  {text:'猎头打来电话，给了一个薪资翻倍的机会。',icon:'📞',tag:'机遇',
    opts:[
      {label:'冲！去新公司拼一把',eff:()=>{state.wealth+=20;state.stability-=10;state.stress+=8}},
      {label:'不折腾了，现在的同事挺好的',eff:()=>{state.stability+=5;state.stress-=3}},
    ]},
  {text:'你的副业突然火了，一个周末赚了一个月的钱。',icon:'🔥',tag:'机遇',
    opts:[
      {label:'辞职all-in副业',eff:()=>{state.wealth+=25;state.stability-=15;state.choices.sideHustle=true}},
      {label:'当个额外收入就行，主业不能丢',eff:()=>{state.wealth+=8;state.stability+=3}},
    ]},
  {text:'VP很赏识你，点名让你负责核心项目——代价是几乎没有周末。',icon:'⭐',tag:'机遇',
    opts:[
      {label:'拼了！这是职场跃升的关键机会',eff:()=>{state.stability+=15;state.stress+=12;state.wealth+=8}},
      {label:'婉拒，想把周末留给自己的爱好',eff:()=>{state.stability+=3;state.stress-=10}},
    ]},
  {text:'你的技能成了市场紧缺货，同行纷纷来挖。',icon:'💎',tag:'机遇',
    opts:[
      {label:'价高者得，去最好的平台',eff:()=>{state.wealth+=15;state.stability-=5;state.stress+=5}},
      {label:'跟老板谈涨薪，留在熟悉的地方',eff:()=>{state.wealth+=8;state.stability+=10}},
    ]},
  {text:'多年前帮过的人成了行业大佬，主动找你合作。',icon:'🤝',tag:'机遇',
    opts:[
      {label:'抓住人脉，全力投入合作',eff:()=>{state.stability+=8;state.wealth+=15;state.stress+=5}},
      {label:'吃个饭叙叙旧就行，人情债最难还',eff:()=>{state.stability+=5}},
    ]},
];

// --- 结局 ---
function determineEnding(){
  const{wealth,stability,stress,choices}=state;
  if(choices.civilSuccess)return'上岸了';
  if((state.path==='postgrad'||state.path==='civil')&&state.gapAttempts>=3&&!choices.postgradSuccess&&!choices.civilSuccess)return'三战皆败，重启';
  if(choices.startedBusiness&&wealth>=95)return'创业这件事';
  if(choices.startedBusiness&&wealth<95)return'创业失败';
  if(choices.changedCareerSuccess&&wealth>=60)return'弯道超车';
  if(wealth>=95&&stress<50)return'提前退场（FIRE）';
  if(stress>=90)return'倦怠离场';
  if(choices.freelance&&wealth>=40)return'自由漂流';
  if(choices.sideHustle&&wealth>=70)return'副业翻身';
  const ai=getAIImpact(state.majorCat);
  if(ai==='high'&&!choices.changedCareer&&wealth<30&&stress>60)return'35岁的下午';
  if(wealth<25&&stability<25&&stress>75)return'困在系统里';
  return'勤恳退休';
}

function showTransition(title,subtitle,cb){
  const o=document.getElementById('transition-overlay');
  o.style.display='flex';o.classList.remove('fade-out');
  o.innerHTML=`<div class="trans-year">${title}</div><div class="trans-title">${subtitle}</div><div class="trans-bar"></div>`;

// ============================================================
// 节点推进
// ============================================================
function getNextNode(){const idx=NODE_YEARS.indexOf(state.careerNode);return idx>=0&&idx<NODE_YEARS.length-1?NODE_YEARS[idx+1]:null}
function advanceTo(nextNode){
  const yearGap=nextNode-state.careerYear;
  state.careerNode=nextNode;
  state.age+=yearGap;
  state.year+=yearGap;
  state.careerYear=nextNode;
  state.careerEvent=null;
  refreshEconomy();
  // 按年份跨度插入随机事件（每2年最多1个事件）
  const events=[];
  const maxEvents=Math.min(Math.floor(yearGap/2),3);
  for(let i=0;i<maxEvents;i++){
    if(Math.random()<0.45){
      events.push(Math.random()<0.5?pick(CRISIS_EVENTS):pick(OPP_EVENTS));
    }
  }
  if(events.length>0){
    state.eventQueue=events;
  }
  const label=`第${nextNode}年`;
  if(nextNode>=15){
    showTransition(label,`${state.age}岁 · 人生下半场`,()=>render());
  }else{
    render();
  }
}
