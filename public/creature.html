<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交互式小兽</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffc8;
            overflow: hidden;
            font-family: sans-serif;
        }
        #gameCanvas {
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            color: #555;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="instructions">
        <h3>使用 W, A, S, D 键移动</h3>
        <p>点击动物让它跳跃！</p>
    </div>
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const width = canvas.width;
    const height = canvas.height;

    // 动物状态
    const animal = { x: 400, y: 300, vx: 0, vy: 0, dir: 1, frame: 0, jumping: false };
    const GRAVITY = 0.5;
    const SPEED = 3;
    const JUMP = -10;
    const GROUND = 500;
    const keys = {};

    // 绘制简单小兽
    function drawCreature(x, y, dir, frame) {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(dir, 1);

        // 身体
        ctx.fillStyle = '#FF9944';
        ctx.beginPath();
        ctx.ellipse(0, 0, 20, 16, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#663300';
        ctx.lineWidth = 2;
        ctx.stroke();

        // 头
        ctx.fillStyle = '#FFBB77';
        ctx.beginPath();
        ctx.arc(22, -8, 12, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        // 眼睛
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(27, -11, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(28, -10, 2.5, 0, Math.PI * 2);
        ctx.fill();

        // 耳朵
        ctx.fillStyle = '#FF9944';
        ctx.beginPath();
        ctx.moveTo(16, -16);
        ctx.lineTo(12, -28);
        ctx.lineTo(22, -14);
        ctx.fill();
        ctx.stroke();

        // 腿
        const legSwing = Math.sin(frame * 0.3) * 4;
        ctx.strokeStyle = '#663300';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(-10, 14); ctx.lineTo(-14, 24 + legSwing); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-2, 14); ctx.lineTo(-4, 24 - legSwing); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(8, 14); ctx.lineTo(6, 24 + legSwing); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(16, 14); ctx.lineTo(18, 24 - legSwing); ctx.stroke();

        // 尾巴
        ctx.strokeStyle = '#FF9944';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(-20, -2);
        ctx.quadraticCurveTo(-30 + Math.sin(frame * 0.2) * 4, -10, -28, -18 + Math.sin(frame * 0.15) * 6);
        ctx.stroke();

        ctx.restore();
    }

    function update() {
        if (keys['a'] || keys['A']) { animal.vx = -SPEED; animal.dir = -1; }
        else if (keys['d'] || keys['D']) { animal.vx = SPEED; animal.dir = 1; }
        else animal.vx = 0;

        if ((keys['w'] || keys['W']) && !animal.jumping) {
            animal.vy = JUMP;
            animal.jumping = true;
        }

        animal.vy += GRAVITY;
        animal.x += animal.vx;
        animal.y += animal.vy;

        if (animal.y >= GROUND) {
            animal.y = GROUND;
            animal.vy = 0;
            animal.jumping = false;
        }
        animal.x = Math.max(30, Math.min(770, animal.x));
        animal.frame++;
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);
        // 地面
        ctx.fillStyle = '#88CC66';
        ctx.fillRect(0, GROUND + 24, width, 10);
        ctx.fillStyle = '#669944';
        ctx.fillRect(0, GROUND + 26, width, 8);
        // 小兽
        drawCreature(animal.x, animal.y, animal.dir, animal.frame);
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', e => { keys[e.key] = true; });
    window.addEventListener('keyup', e => { keys[e.key] = false; });
    canvas.addEventListener('click', () => {
        if (!animal.jumping) { animal.vy = JUMP; animal.jumping = true; }
    });

    loop();
</script>
</body>
</html>
