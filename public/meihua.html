<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeihuaBOT</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=Space+Grotesk:wght@300;400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0000FF;color:#050505;font-family:'Space Grotesk',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.card{background:#FFF;max-width:560px;width:100%;padding:48px 40px;border:3px solid #000;box-shadow:10px 10px 0 #FF0080}
h1{font-family:'Syne',sans-serif;font-size:42px;font-weight:800;letter-spacing:-1px;line-height:1}
h1 span{color:#FF0080}
.cat{display:inline-block;background:#FF0080;color:#FFF;font-size:10px;letter-spacing:3px;padding:4px 12px;margin:16px 0 24px}
p{font-size:15px;line-height:1.9;color:#333}
.btn{display:inline-block;margin-top:32px;padding:14px 36px;background:#0000FF;color:#FFF;font-family:'Syne',sans-serif;font-size:14px;font-weight:600;letter-spacing:2px;text-decoration:none;border:2px solid #0000FF;transition:all .2s}
.btn:hover{background:#FF0080;border-color:#FF0080}
.back{display:inline-block;margin-top:20px;margin-left:16px;color:#0000FF;font-size:12px;letter-spacing:2px;text-decoration:none;border-bottom:2px solid #FF0080;padding-bottom:2px}
.back:hover{color:#FF0080}
</style>
</head>
<body>
<div class="card">
  <h1>Meihua<span>BOT</span></h1>
  <div class="cat">AI 决策助手</div>
  <p>基于大模型的多场景 AI 决策系统，覆盖饮食、出行、社交等生活场景，通过多轮交互与长期记忆生成个性化建议。</p>

  <a href="/" class="back">← Back</a>
</div>
</body>
</html>
